<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Learnly — Sign in</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 48px;
        background: #0a0a0b;
        color: #f0efe8;
      }

      a { color: #c8f135; text-decoration: none; }

      .card {
        max-width: 520px;
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.03);
      }

      .muted { color: rgba(240, 239, 232, 0.7); line-height: 1.6; }
      code { color: #e8c87a; }

      label { display: block; margin: 14px 0 6px; color: rgba(240, 239, 232, 0.85); font-size: 13px; }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #f0efe8;
        outline: none;
      }

      button {
        width: 100%;
        margin-top: 16px;
        padding: 11px 14px;
        border: none;
        border-radius: 10px;
        background: #c8f135;
        color: #0a0a0b;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled { opacity: 0.6; cursor: not-allowed; }

      #status { margin-top: 14px; font-size: 13px; line-height: 1.5; }
      #status[data-type="error"] { color: #ff8b8b; }
      #status[data-type="ok"] { color: #c8f135; }

      .token-box {
        margin-top: 16px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.02);
        display: none;
      }

      .token-box pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        color: rgba(240, 239, 232, 0.75);
      }

      .secondary {
        width: 100%;
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: transparent;
        color: rgba(240, 239, 232, 0.85);
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 style="margin: 0 0 12px">Sign in</h1>
      <p class="muted" style="margin: 0 0 18px">
        Sign in to get a JWT token. This posts to <code>POST /api/auth/login</code> on this server.
      </p>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button id="submit" type="submit">Sign in</button>
        <button id="logout" class="secondary" type="button">Clear saved token</button>

        <div id="status" class="muted" aria-live="polite"></div>
      </form>

      <div class="token-box" id="token-box">
        <div class="muted">Saved token (localStorage key: <code>learnly_token</code>)</div>
        <pre id="token-text"></pre>
      </div>

      <p class="muted" style="margin: 16px 0 0">New here? <a href="/signup.html">Create an account</a></p>
      <p style="margin: 16px 0 0"><a href="/">← Back to home</a></p>
    </div>

    <script src="/auth.js"></script>
    <script>
      const { $, setStatus, apiPostJson, saveToken, loadToken, clearToken } = window.LearnlyAuth;

      function renderToken() {
        const token = loadToken();
        const box = $("#token-box");
        const text = $("#token-text");

        if (!token) {
          box.style.display = "none";
          text.textContent = "";
          return;
        }

        box.style.display = "block";
        text.textContent = token;
      }

      $("#logout").addEventListener("click", () => {
        clearToken();
        setStatus("Saved token cleared.", "ok");
        renderToken();
      });

      $("#login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        setStatus("", "");

        const submit = $("#submit");
        submit.disabled = true;
        submit.textContent = "Signing in…";

        try {
          const data = await apiPostJson("/api/auth/login", {
            email: $("#email").value.trim().toLowerCase(),
            password: $("#password").value,
          });
          saveToken(data.token);
          setStatus("Signed in. Token saved.", "ok");
          renderToken();
        } catch (err) {
          setStatus(err.message || "Login failed", "error");
        } finally {
          submit.disabled = false;
          submit.textContent = "Sign in";
        }
      });

      renderToken();
    </script>
  </body>
</html>
