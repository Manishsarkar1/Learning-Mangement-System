<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learnly — Dashboard</title>
    <link rel="stylesheet" href="/app-shell.css" />
  </head>
  <body>
    <div class="page">
      <div class="card" style="max-width:640px;margin:40px auto;">
        <h2 style="margin-top:0;">Preparing your dashboard…</h2>
        <p class="muted" id="dashboard-router-status">Checking your session and role.</p>
      </div>
    </div>
    <script src="/lms.js"></script>
    <script>
      (async function () {
        const status = document.getElementById("dashboard-router-status");
        try {
          const me = await window.Learnly.api("/api/auth/me");
          const role = me && me.user ? me.user.role : "";
          if (role === "student") window.location.replace("/student-dashboard.html");
          else if (role === "instructor") window.location.replace("/instructor-dashboard.html");
          else if (role === "admin") window.location.replace("/admin-dashboard.html");
          else status.textContent = "Could not determine your role. Please sign in again.";
        } catch (error) {
          status.textContent = error.message || "Session not found. Please sign in.";
        }
      })();
    </script>
  </body>
</html>
